[tool.ruff]
line-length = 120
target-version = "py312"

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "N",
    "UP",
]
ignore = [
    "E501",
    "N818",
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**" = ["N802", "N803", "N806"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
