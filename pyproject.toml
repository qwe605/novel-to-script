[tool.ruff]
line-length = 120
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "N818",  # exception suffix (not always appropriate)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**" = ["N802", "N803", "N806"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
